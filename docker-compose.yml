version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build: .
    ports:
      - "8501:8501"
    command: python -m streamlit run app/ui.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
    env_file:
      - .env